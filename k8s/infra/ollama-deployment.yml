apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ollama

  template:
    metadata:
      labels:
        app: ollama

    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 11434

          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama

          resources:
            requests:
              memory: "6Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "2000m"

      volumes:
        - name: ollama-storage
          hostPath:
            path: /run/desktop/mnt/host/c/Users/hp/.ollama
            type: DirectoryOrCreate