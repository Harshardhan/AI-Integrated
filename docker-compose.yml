services:

  # =================================
  # CORE SERVICES
  # =================================

  eureka-server:
    build:
      context: ./EurekaServerApp
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    env_file:
      - .env
    networks:
      - my-biz-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/eureka/apps"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./API-Gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - my-biz-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build:
      context: ./ConfigServerApp
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    env_file:
      - .env
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - my-biz-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

#=======================================================
#MICROSERVICES
#=======================================================
  product-service:
    build:
      context: ./ProductServiceApp
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8094:8094"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql-product:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - my-biz-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5




#=====================================================
#DATABASES
#=====================================================
  mysql-product:
    image: mysql:8
    container_name: mysql-product
    environment:
       DATABASE_USERNAME: ${DATABASE_USERNAME}
       DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    networks:
       - my-biz-network
    restart: unless-stopped






#====================================================
#Monitoring & Loggigng
#====================================================
  
  redis:
    image: redis:7.4-alpine
    container_name: redis
    command: redis-server --requirepass master
    networks:
      - my-biz-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "master", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

      
#====================================================
#MESSAGING
#====================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - my-biz-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    container_name: kafka
    hostname: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - my-biz-network
    restart: unless-stopped

  



# =================================
# NETWORKS
# =================================

networks:
  my-biz-network:
    driver: bridge