spring.application.name=UserManagementAPI
server.port = 8092
# Database configuration
spring.datasource.url=jdbc:mysql://mysql-user:3306/user_management_db
spring.datasource.username=root
spring.datasource.password=master
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.format_sql=true
# Logging configuration
logging.level.org.springframework=INFO
logging.level.com.example=INFO

# Kafka configuration
spring.kafka.bootstrap-servers=kafka:9092

app.kafka.topic.user-events=user-events-topic
#Eureka client configuration
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Hibernate logs
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql=ERROR
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
logging.level.com.zaxxer.hikari=INFO

spring.cache.type=redis

spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=master